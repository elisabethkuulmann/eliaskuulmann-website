<body>

    <nav class="nav">
        <a href="index.html" class="nav__name">Elias Kuulmann</a>
        <div class="nav__links">
            <a href="cv.html">CV</a>
            <a href="contact.html">Contact</a>

    </nav>

    <main class="work-page">

        <h1 class="work-page__title work-page__title--small">A selection of photographs made between</h1>
        <p class="work-page__year work-page__year--small">2024–2026</p>

        <div class="work-page__photos">

            <figure class="work-page__image work-page__image--portrait">
                <img src="images/_DSC9638.jpg" alt="A selection of photographs - Stair">
            </figure>

            <figure class="work-page__image work-page__image--portrait">
                <img src="images/Courtland_for_cyanotype.jpg" alt="A selection of photographs - Courtland cyanotype">
            </figure>

            <figure class="work-page__image work-page__image--portrait">
                <img src="images/Cyanotype collage.png" alt="A selection of photographs - Cyanotype collage">
            </figure>

            <figure class="work-page__image work-page__image--portrait">
                <img src="images/Kivi varjuga.jpg" alt="A selection of photographs - Rock with shadow">
            </figure>

            <figure class="work-page__image work-page__image--portrait">
                <img src="images/kivid.jpg" alt="A selection of photographs - Rocks">
            </figure>

                <img src="images/Liisa lizard.jpg" alt="A selection of photographs - Liisa with lizard">

        <a href="index.html" class="work-page__back">&#8592; Back</a>

    </main>

    <script>
        const images = Array.from(document.querySelectorAll('.work-page__photos img'));
        let current = 0;
        const lb = document.createElement('div');
        lb.className = 'lightbox';
        lb.innerHTML = `
            <button class="lightbox__close">✕</button>
            <button class="lightbox__prev">&#8592;</button>
            <div class="lightbox__content"><img class="lightbox__img" src=""></div>
            <button class="lightbox__next">&#8594;</button>
        `;
        document.body.appendChild(lb);
        const lbImg = lb.querySelector('.lightbox__img');
        function open(i) { current = i; lbImg.src = images[current].src; lb.classList.add('open'); }
        function close() { lb.classList.remove('open'); }
        function prev() { current = (current - 1 + images.length) % images.length; lbImg.src = images[current].src; }
        function next() { current = (current + 1) % images.length; lbImg.src = images[current].src; }
        images.forEach((img, i) => img.addEventListener('click', () => open(i)));
        lb.querySelector('.lightbox__close').addEventListener('click', close);
        lb.querySelector('.lightbox__prev').addEventListener('click', prev);
        lb.querySelector('.lightbox__next').addEventListener('click', next);
        lb.addEventListener('click', e => { if (e.target === lb) close(); });
        document.addEventListener('keydown', e => {
            if (!lb.classList.contains('open')) return;
            if (e.key === 'ArrowRight') next();
            if (e.key === 'ArrowLeft') prev();
            if (e.key === 'Escape') close();
        });
    </script>

</body>

</html>
