<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Elias Kuulmann</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap"
    rel="stylesheet">
  <style>
    .contact-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: calc(var(--nav-height) + 2rem) 1.5rem 2rem;
    }

    .pigeon-postcard {
      position: relative;
      width: 100%;
      max-width: 820px;
      aspect-ratio: 1344 / 896;
      border-radius: 3px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08), 0 12px 40px rgba(0, 0, 0, 0.12);
    }

    .pigeon-postcard__bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    /* Email input — right after "From :" on its underline */
    .pigeon-postcard__email {
      position: absolute;
      top: 18%;
      left: 14%;
      width: 34%;
      background: transparent;
      border: none;
      outline: none;
      font-family: 'DM Sans', sans-serif;
      font-size: clamp(0.9rem, 1.8vw, 1.15rem);
      color: #1a1a1a;
      z-index: 2;
      padding: 0;
    }

    .pigeon-postcard__email::placeholder {
      color: rgba(26, 26, 26, 0.35);
      font-style: italic;
    }

    /* Textarea — just below "Your message here :" */
    .pigeon-postcard__textarea {
      position: absolute;
      top: 44%;
      left: 6%;
      width: 55%;
      height: 52%;
      background: transparent;
      border: none;
      outline: none;
      font-family: 'DM Sans', sans-serif;
      font-size: clamp(0.9rem, 1.8vw, 1.15rem);
      color: #1a1a1a;
      line-height: 1.8;
      resize: none;
      z-index: 2;
      padding: 0;
    }

    .pigeon-postcard__textarea::placeholder {
      color: rgba(26, 26, 26, 0.3);
      font-style: italic;
    }

    /* Invisible button covering the pigeon top-right */
    .pigeon-postcard__send-btn {
      position: absolute;
      top: 3%;
      right: 2%;
      width: 30%;
      height: 48%;
      background: transparent;
      border: none;
      cursor: pointer;
      z-index: 2;
    }

    .pigeon-thankyou {
      position: relative;
      width: 100%;
      max-width: 820px;
      aspect-ratio: 1344 / 896;
      border-radius: 3px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08), 0 12px 40px rgba(0, 0, 0, 0.12);
      display: none;
    }

    .pigeon-thankyou__bg {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .pigeon-postcard--sending {
      opacity: 0.7;
      pointer-events: none;
    }

    .pigeon-error {
      position: absolute;
      bottom: 8%;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(180, 40, 40, 0.9);
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      padding: 0.5rem 1.2rem;
      border-radius: 3px;
      z-index: 10;
      display: none;
      white-space: nowrap;
    }

    .pigeon-error.visible {
      display: block;
    }



    @media (max-width: 600px) {
      .contact-page {
        padding: calc(var(--nav-height) + 1rem) 0.5rem 1rem;
      }

      .pigeon-postcard,
      .pigeon-thankyou {
        aspect-ratio: auto;
        min-height: 400px;
      }
    }
  </style>
</head>

  <script>
    const postcard = document.getElementById('postcard');
    const thankyou = document.getElementById('thankyou');
    const sendBtn = document.getElementById('sendBtn');
    const emailInput = document.getElementById('pc-from');
    const messageInput = document.getElementById('pc-message');
    const errorMsg = document.getElementById('errorMsg');

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add('visible');
      setTimeout(() => errorMsg.classList.remove('visible'), 3000);
    }

    sendBtn.addEventListener('click', async function () {
      if (!emailInput.value.trim() || !messageInput.value.trim()) {
        showError('Please fill in all fields.');
        return;
      }
      if (!emailInput.validity.valid) {
        showError('Please enter a valid email.');
        return;
      }
      postcard.classList.add('pigeon-postcard--sending');
      try {
        const response = await fetch('https://formspree.io/f/xqeyobjw', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: emailInput.value.trim(), message: messageInput.value.trim() })
        });
        if (response.ok) { transitionToThankYou(); } else { throw new Error(); }
      } catch (err) {
        postcard.classList.remove('pigeon-postcard--sending');
        showError('Something went wrong. Please try again.');
      }
    });

    function transitionToThankYou() {
      postcard.style.display = 'none';
      thankyou.style.display = 'block';
    }

    emailInput.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') { e.preventDefault(); messageInput.focus(); }
    });
  </script>
